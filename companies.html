<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenterPrime - Your Companies</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="companies-page">

    <div class="main">
        <header>
            <h1>Your Companies</h1>
            <div class="inputs">
                <input type="text" placeholder="Search your Companies..." class="search-input">
                <button onclick="openModal()" class="create-company">Create New Company</button>

                <div id="companies-list" class="companies-grid">
                </div>
            </div>

            <div class="default-company">
                <h3>Default Company</h3>
                <p>You can delete this company or edit company name to own yours!</p>

                <div class="company-configuration-btn">
                    <button class="edit-company"><span class="material-symbols-outlined">edit</span></button>
                    <button class="delete-company"><span class="material-symbols-outlined">delete</span></button>
                    <button class="visit-company"><span class="material-symbols-outlined">chevron_right</span></button>
                </div>
            </div>
        </header>
    </div>

    <div id="company-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Create New Company</h3>
                <button onclick="closeModal()" class="close-btn">&times;</button>
            </div>
            <form id="create-company-form">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="comp-name" placeholder="e.g. Acme Solutions" required>
                </div>
                <div class="form-group">
                    <label>Owner Name (Optional)</label>
                    <input type="text" id="comp-gst" placeholder="e.g. John Doe">
                </div>
                <div class="modal-actions">
                    <button type="button" onclick="closeModal()" class="cancel-btn">Cancel</button>
                    <button type="submit" class="save-btn">Create Company</button>
                </div>
            </form>
        </div>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="scripts/supabase-init.js"></script>

<script>
    async function checkUser() {
        
        if (typeof supabase === 'undefined') {
            console.error("Supabase not found! Waiting...");
            return;
        }
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) window.location.href = 'login.html';
    }
    
    window.addEventListener('load', checkUser);
</script>

<script src="companies.js"></script>

</html>
