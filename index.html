<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenterPrime ERP 9</title>
    <link rel="stylesheet" href="CSS/main.css">
</head>
<body>
    
    <header>
        <h2 class="header-h2">Zenter<span class="prime-span">Prime</span></h2>

        <ul>
            <li class="highlight"><a href="#"><span class="link-span"><u>K:</u></span> COMPANIES</a></li>
            <li><a href="#"><span class="link-span"><u>S:</u></span> SHORTCUTS</a></li>
            <li><a href="#"><span class="link-span"><u>G:</u></span> SEARCH</a></li>
            <li><a href="#"><span class="link-span"><u>Y:</u></span> DATA</a></li>

        </ul>
    </header>
    <br>

    <h3>YOUR COMPANIES</h3>
    <br>

    <div class="input-group">
        <input type="text" placeholder="SEARCH">
    </div>

    <div class="btn-container">
        <button class="create-new-company"><a href="create-company.html">CREATE NEW COMPANY</a></button>
        <button class="configure-existing-companies">CONFIGURE EXISTING COMPANIES</button>
    </div>

    <div class="company-table-container">

        <thead>
            <tr>
                <th>SR NO</th>
                <th>COMPANY NAME</th>
                <th>OWNER</th>
                <th>CREATED AT</th>

        <tbody>
            <tr class="table-row active">
                <td>1</td>
                <td>ABC TRADERS</td>
                <td>MILAP KHASI</td>
                <td>12:00 PM</td>
            </tr>
        </tbody>
